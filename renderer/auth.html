<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arduino Knurdz IDE - Login</title>
  <link rel="stylesheet" href="auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="auth-container">
    <!-- Logo & Title -->
    <div class="auth-header">
      <div class="logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="22" stroke="url(#gradient)" stroke-width="3" />
          <path d="M16 24h16M24 16v16" stroke="url(#gradient)" stroke-width="3" stroke-linecap="round" />
          <defs>
            <linearGradient id="gradient" x1="0" y1="0" x2="48" y2="48">
              <stop offset="0%" stop-color="#00d9ff" />
              <stop offset="100%" stop-color="#8b5cf6" />
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1>Arduino Knurdz IDE</h1>
      <p class="subtitle">Code, compile, and deploy wirelessly</p>
    </div>

    <!-- Tab Switcher -->
    <div class="auth-tabs">
      <button class="tab-btn active" data-tab="login">Sign In</button>
      <button class="tab-btn" data-tab="register">Create Account</button>
    </div>

    <!-- Login Form -->
    <form id="login-form" class="auth-form active">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary">
        <span class="btn-text">Sign In</span>
        <span class="btn-loader hidden">
          <svg class="spinner" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="3" />
          </svg>
        </span>
      </button>
      <div class="form-footer">
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>
    </form>

    <!-- Register Form -->
    <form id="register-form" class="auth-form">
      <div class="form-group">
        <label for="register-name">Full Name</label>
        <input type="text" id="register-name" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label for="register-email">Email</label>
        <input type="email" id="register-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="register-password">Password</label>
        <input type="password" id="register-password" placeholder="Min. 8 characters" required minlength="8">
      </div>
      <div class="form-group">
        <label for="register-confirm">Confirm Password</label>
        <input type="password" id="register-confirm" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary">
        <span class="btn-text">Create Account</span>
        <span class="btn-loader hidden">
          <svg class="spinner" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="3" />
          </svg>
        </span>
      </button>
    </form>

    <!-- Error/Success Messages -->
    <div id="auth-message" class="message hidden"></div>
  </div>

  <script src="auth.js"></script>
</body>

</html>
